name: ci

on:
  push:
    branches: ["*"]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: ["*"]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "build"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go build ./...

  golangci:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "golangci-lint"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  semgrep:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "semgrep"
    container: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config auto --error

  deadcode:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "deadcode"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go install golang.org/x/tools/cmd/deadcode@latest
      - run: deadcode ./...

  test:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "unit-test"
    container: golang:latest
    steps:
      - uses: actions/checkout@v4
      - run: go test -timeout 5m ./...

  web-lint:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "web-lint"
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  web-test:
    if: github.repository == '0x5d/shiru'
    runs-on: ubuntu-latest
    name: "web-test"
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
