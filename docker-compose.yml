services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shiru
      POSTGRES_USER: shiru
      POSTGRES_PASSWORD: shiru
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiru"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ko.local/shiru
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://shiru:shiru@postgres:5432/shiru?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      DICTIONARY_API_BASE_URL: ${DICTIONARY_API_BASE_URL:-}
      WANIKANI_API_BASE_URL: ${WANIKANI_API_BASE_URL:-https://api.wanikani.com/v2}
      AUDIO_STORAGE_PATH: /data/audio
    volumes:
      - audiodata:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  esdata:
  audiodata:
